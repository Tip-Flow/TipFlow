<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mise — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #09100e;
      color: #e8f0ec;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      gap: 16px;
      padding: 24px;
      text-align: center;
    }
    .icon { font-size: 56px; }
    h1 { font-size: 22px; font-weight: 800; color: #e8f0ec; }
    p  { font-size: 15px; color: #6b7a74; max-width: 320px; line-height: 1.6; }
    button {
      margin-top: 8px;
      padding: 12px 28px;
      background: #4169E1;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>You are offline</h1>
  <p>Mise can't reach the server right now. Check your connection and try again.</p>
  <button onclick="window.location.reload()">Try again</button>
</body>
</html>
